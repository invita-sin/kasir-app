name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          cd android
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/kasir-app.keystore

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/kasir-app-v1.0.0-release.apk

      - name: Setup GPG for F-Droid
        run: |
          echo "${{ secrets.FDROID_GPG_KEY }}" | base64 -d | gpg --batch --import 2>&1
          echo "=== GPG keys after import ==="
          gpg --list-keys 2>&1
          mkdir -p public/fdroid/repo

      - name: Generate F-Droid repo
        run: |
          bash -x scripts/build-fdroid.sh \
            android/app/build/outputs/apk/release/kasir-app-v1.0.0-release.apk \
            public/fdroid/repo \
            1 1.0.0 24 34
        env:
          GPG_TTY: /dev/null

      - name: Deploy F-Droid repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public/fdroid
          publish_branch: gh-pages
          destination_dir: fdroid
          keep_files: false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasir-app-release
          path: android/app/build/outputs/apk/release/*.apk
