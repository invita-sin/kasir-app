name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          cd android
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/kasir-app.keystore

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/kasir-app-v1.0.0-release.apk

      - name: Extract keystore cert hex for F-Droid
        id: cert
        run: |
          CERT_HEX=$(keytool -exportcert -alias "${{ secrets.KEY_ALIAS }}" \
            -keystore android/kasir-app.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>/dev/null | \
            xxd -p | tr -d '\n')
          echo "cert_hex=$CERT_HEX" >> "$GITHUB_OUTPUT"
          echo "F-Droid pubkey hex: ${#CERT_HEX} chars"

      - name: Setup F-Droid repo
        run: |
          mkdir -p public/fdroid/repo
          cp android/app/build/outputs/apk/release/kasir-app-v1.0.0-release.apk public/fdroid/repo/

      - name: Generate unsigned F-Droid V1 index (JSON)
        run: |
          python3 scripts/build-fdroid.py \
            public/fdroid/repo/kasir-app-v1.0.0-release.apk \
            public/fdroid/repo \
            --version-code 1 --version-name 1.0.0 \
            --min-sdk 24 --target-sdk 34 \
            --pubkey-hex "${{ steps.cert.outputs.cert_hex }}" \
            --repo-url "https://invita-sin.github.io/kasir-app/fdroid/repo"

      - name: Sign index-v1.jar with JAR signing
        run: |
          jarsigner -keystore android/kasir-app.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -sigalg SHA1withRSA -digestalg SHA1 \
            public/fdroid/repo/index-v1.jar \
            "${{ secrets.KEY_ALIAS }}"
          echo "JAR signing OK"

      - name: Show generated repo files
        run: ls -la public/fdroid/repo/

      - name: Deploy F-Droid repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public/fdroid/repo
          publish_branch: gh-pages
          destination_dir: fdroid/repo
          keep_files: false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasir-app-release
          path: android/app/build/outputs/apk/release/*.apk
